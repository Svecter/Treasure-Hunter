<!--Aquí empieza la sección body de la página web.-->
  <body>
    <div class="background">
      <div class="navbar">
          <img src="images/logo.gif" class="logo">
          <p>RETRO STUDIO</p>
          <nav>
              <ul>

<!--Aquí empieza la sección formulario de página de la web.-->
      <div class="wrapper">
        <div class="title">
          Contact us
        </div>
        <div class="form">
          <div class="input_field">
            <label>First Name</label>
            <input type="text" required placeholder="Henry Walton Jones" class="input">
          </div>
          <div class="input_field">
            <label>Last Name</label>
            <input type="text" required placeholder="Junior" class="input">
          </div>
          <div class="input_field">
            <label>Gender</label>
            <div class="custom_select">
              <select required>
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="Non-binary">Non-binary</option>
              </select>
            </div>
          </div>
          <div class="input_field">
            <label>Birthdate</label>
            <input type="date" required class="input">
          </div>
          <div class="input_field">
            <label>Email Adress</label>
            <input type="email" required placeholder="indianajones@me.com" class="input">
          </div>
          <div class="input_field">
            <label>Message</label>
            <textarea placeholder required="Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusantium expedita placeat, omnis nobis, reiciendis illo." class="textarea"></textarea>
          </div>
          <div class="input_field">
            <label>City</label>
            <div class="custom_select">
              <select required>
                <option value="">Select</option>
                <option value="barcelona">Barcelona</option>
                <option value="girona">Girona</option>
                <option value="lleida">Lleida</option>
                <option value="tarragona">Tarragona</option>
              </select>
            </div>
          </div>
          <div class="input_field">
            <label>Adress</label>
            <input type="text" required placeholder="25 Pine Road, Ferndale, New York, USA" class="input">
          </div>
          <div class="input_field">
            <label>Postal Code</label>
            <input type="text" required placeholder="10001" class="input">
          </div>
          <div class="input_field">
            <label>Phone Number</label>
            <input type="text" required placeholder="123456789" class="input">
          </div>
          <div class="input_field">
            <label>Password</label>
            <input type="password" required class="input">
          </div>
          <div class="input_field">
            <label>Confirm Password</label>
            <input type="password" required class="input">
          </div>
          <form>
            <div class="input_field terms">
              <label class="check">
                <input type="checkbox" required>
                <span class="checkmark"></span>
              </label>
              <p>Agree to terms and conditions</p>
            </div>
            <div class="input_field">
              <input type="submit" value="Send Message" class="btn">
            </div>
          </form>
        </div>
      </div>
    </div>

<!--Aquí empieza la sección footer o pie de página de la web.-->
